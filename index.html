<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数理変換タクティクス (最強AI育成モード搭載)</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .game-container { max-width: 100%; width: 100%; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); padding: 16px; box-sizing: border-box; }
        h1 { text-align: center; font-size: 20px; margin-top: 0; color: #0f172a; }
        
        .debug-panel { background: #f0fdf4; border: 2px dashed #4ade80; color: #166534; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-family: monospace; }
        .ai-train-panel { background: #fef3c7; border: 2px solid #f59e0b; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; color: white; font-size: 11px; margin-bottom: 5px; }
        .status-loading { background: #64748b; }
        .status-success { background: #10b981; }
        .status-error { background: #ef4444; }

        .timer-panel { background: #fff1f2; border: 2px solid #fecdd3; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .timer-title { font-size: 13px; color: #991b1b; font-weight: bold; margin-bottom: 4px; }
        .timer-stock-row { font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .timer-byoyomi-label { font-size: 12px; font-weight: bold; color: #ef4444; letter-spacing: 3px; margin-bottom: 2px; display: none; }
        .timer-count { font-size: 36px; font-weight: bold; font-family: monospace; color: var(--danger); transition: color 0.3s; }

        .setup-panel { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .setting-group { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 15px; background: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .setting-item input { width: 80px; padding: 4px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: right; }
        
        .rules-summary { background: #e0f2fe; border: 1px solid #bae6fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; color: #0369a1; }

        .pvp-board { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 15px; }
        .player-status { padding: 12px; border-radius: 8px; border: 2px solid transparent; background: #f8fafc; border-color: var(--border); transition: all 0.3s; }
        .active-turn { box-shadow: 0 0 12px rgba(37,99,235,0.6); border-color: var(--primary) !important; background: #eff6ff; }
        .my-status { border-color: #cbd5e1; background: #f1f5f9; }
        .player-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 8px; }
        .score-display { font-size: 18px; color: var(--success); font-weight: bold; text-align: right; }
        .mini-card-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .mini-card { background: white; border: 1px solid #cbd5e1; padding: 4px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; text-align: center; }
        .mini-card.selected { background: #7c3aed; color: white; border-color: #7c3aed; }
        .mini-card.selected .factor-label { color: #ede9fe; }
        .factor-label { font-size: 9px; font-weight: normal; color: #7c3aed; margin-top: 2px; }
        .analysis-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 10px; background: #f5f3ff; padding: 8px; border-radius: 8px; }
        .analysis-panel { background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 8px; padding: 10px; margin-bottom: 15px; font-size: 12px; }
        .analysis-panel .row { margin-bottom: 4px; }
        .analysis-panel .row.invalid { color: #b91c1c; text-decoration: line-through; opacity: 0.7; }
        .section-title { font-size: 13px; font-weight: bold; color: #64748b; margin-bottom: 8px; border-left: 4px solid var(--primary); padding-left: 8px; }
        .hand-container { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; background: #eff6ff; border: 2px dashed #bfdbfe; border-radius: 12px; padding: 10px; margin-bottom: 15px; align-items: flex-start; }
        .card { background: white; border: 2px solid var(--primary); color: var(--primary); padding: 8px 14px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; user-select: none; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; }
        .card:hover { transform: scale(1.05); }
        .card.selected { background: var(--primary); color: white; box-shadow: 0 0 10px rgba(37,99,235,0.4); }
        
        .actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        
        .btn-attack { grid-column: span 2; background: #10b981; color: white; font-size: 15px; }
        .btn-main { grid-column: span 2; background: #7c3aed; color: white; font-size: 14px; }
        .btn-op { background: #3b82f6; color: white; }
        .btn-op-special { grid-column: span 2; background: #f472b6; color: white; }
        
        button:disabled { background: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed; box-shadow: none !important; opacity: 0.6; }
        
        .log-container { background: #1e293b; color: #f8fafc; padding: 10px; border-radius: 8px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.5; }
        .url-box { background: #e0f2fe; border: 1px solid #bae6fd; padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 15px; word-break: break-all; }
        .waiting-screen { text-align: center; padding: 30px; background: #f1f5f9; border-radius: 12px; margin-bottom: 15px; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        import { executeCPUTurn, loadBrain } from "./cpu-ai.js?v=18";
        
        const firebaseConfig = {
            apiKey: "AIzaSyALUFUpxPoYhRSUMMEkn5whaLnbkvKYvl4",
            authDomain: "math-tactics.firebaseapp.com",
            databaseURL: "https://math-tactics-default-rtdb.firebaseio.com",
            projectId: "math-tactics",
            storageBucket: "math-tactics.firebasestorage.app",
            messagingSenderId: "933574342649",
            appId: "1:933574342649:web:e4ad6d2df878d64dcbef28",
            measurementId: "G-DRXTV6RN8W"
        };
        // 既存ハッシュがあれば使用（招待URL対応）、なければ新規生成
        const existingHash = window.location.hash.substring(1);
        let db, roomRef, roomId = existingHash || "room_" + Math.random().toString(36).substring(2, 11);
        if (!existingHash) history.replaceState(null, '', window.location.pathname);
        
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app);
        roomRef = ref(db, 'rooms/' + roomId);
        
        function setDebugStatus(status, text) {
            const badge = document.getElementById('debug-badge');
            const detail = document.getElementById('debug-detail');
            if(badge && detail) {
                badge.className = "status-badge status-" + status;
                badge.innerText = status === 'success' ? '🟢 接続成功' : (status === 'error' ? '🔴 エラー' : '🟡 通信中...');
                detail.innerText = text;
            }
        }

        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) setDebugStatus('success', `Firebaseに正常接続中。部屋ID: ${roomId}`);
        });
        
        let gameState = {};
        let myPlayerId = null; 
        let selectedIndices = [];
        let previewPicks = [];
        let currentProcessedTurnIdx = -1;
        let timerInterval = null; 

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('invite-url').innerText = window.location.href;

            document.getElementById('btn-load-brain').onclick = async () => {
                const success = await loadBrain();
                if(success) alert("📥 H5変換された脳みそをロードしました！AIの自動思考が正常に機能します。");
                else alert("⚠️ 脳みそファイルの読み込みに失敗しました。GitHubの更新完了を待つかコンソールを確認してください。");
            };

        });

        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                document.getElementById('room-setup').style.display = 'block';
                document.getElementById('waiting-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'none';
                gameState = {}; stopHostTimer(); return;
            }
            
            gameState = data;
            document.getElementById('room-setup').style.display = 'none';
            const currentPlayersCount = gameState.players ? Object.keys(gameState.players).length : 0;
            
            if (gameState.status === 'waiting') {
                document.getElementById('waiting-screen').style.display = 'block';
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('current-count').innerText = currentPlayersCount;
                document.getElementById('target-count').innerText = gameState.maxPlayers;
                document.getElementById('btn-auto-join').style.display = myPlayerId ? 'none' : 'block';
                stopHostTimer();
            } else if (gameState.status === 'playing' || gameState.status === 'finished') {
                document.getElementById('waiting-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                
                if (gameState.status === 'playing') {
                    if (myPlayerId === 'P1') startHostTimer();

                    const activePlayerId = gameState.turnOrder ? gameState.turnOrder[gameState.currentTurnIdx] : null;
                    if (activePlayerId && activePlayerId !== myPlayerId && myPlayerId === 'P1' && gameState.isAIGame) {
                        const snapState = JSON.parse(JSON.stringify(gameState));
                        setTimeout(() => { executeCPUTurn(roomRef, activePlayerId, runTransaction, snapState); }, 1000);
                    }

                    if (myPlayerId) {
                        if (activePlayerId === myPlayerId && gameState.absoluteTurnIdx !== currentProcessedTurnIdx) {
                            currentProcessedTurnIdx = gameState.absoluteTurnIdx; 
                            if (gameState.absoluteTurnIdx === 0) {
                                runTransaction(roomRef, (c) => { if (c) c.log = (c.log || "") + `🏁 ゲームスタート！\n`; return c; });
                            } else {
                                triggerStartTurnDraw();
                            }
                        }
                    }
                }
                if (gameState.status === 'finished') stopHostTimer();
                updateDOM();
            }
        });

        function startHostTimer() {
            if (timerInterval) return; 
            timerInterval = setInterval(() => {
                runTransaction(roomRef, (currentData) => {
                    if (!currentData || currentData.status !== 'playing') return currentData;
                    const activePlayerId = currentData.turnOrder[currentData.currentTurnIdx];
                    let p = currentData.players[activePlayerId];
                    if (!p) return currentData;
                    
                    if (p.timeStock > 0) { p.timeStock -= 1; currentData.timerMode = "stock"; } 
                    else {
                        currentData.timerMode = "byoyomi"; 
                        if (currentData.remainingTime > 0) currentData.remainingTime -= 1;
                        else {
                            advanceTurn(currentData);
                            currentData.remainingTime = currentData.config?.turnLimitTime || 30;
                            currentData.timerMode = "stock"; 
                        }
                    }
                    return currentData;
                });
            }, 1000);
        }

        function stopHostTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

        const CFG_FIELD_IDS = [
            'cfg-init-hand-count','cfg-init-max-num','cfg-draw-count','cfg-draw-max-num',
            'cfg-hand-limit-num','cfg-win-score','cfg-max-turns',
            'cfg-resource-initial','cfg-resource-min','cfg-resource-log-base',
            'cfg-total-time-stock','cfg-turn-limit-time'
        ];
        const CFG_CHECKBOX_IDS = ['cfg-enable-preview'];

        window.copySettings = function() {
            const data = {};
            CFG_FIELD_IDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) data[id] = el.value;
            });
            CFG_CHECKBOX_IDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) data[id] = el.checked;
            });
            const text = JSON.stringify(data);
            const area = document.getElementById('cfg-clipboard-area');
            if (area) area.value = text;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('設定をコピーしました！');
                }).catch(() => {
                    alert('クリップボードへのコピーに失敗しました。下のテキストエリアから手動でコピーしてください。');
                });
            } else {
                alert('下のテキストエリアに設定を表示しました。手動でコピーしてください。');
            }
        };

        window.applySettings = function() {
            const area = document.getElementById('cfg-clipboard-area');
            const text = (area ? area.value : '').trim();
            if (!text) { alert('テキストエリアに設定JSONを貼り付けてください。'); return; }
            try {
                const data = JSON.parse(text);
                CFG_FIELD_IDS.forEach(id => {
                    if (data[id] !== undefined && document.getElementById(id)) {
                        document.getElementById(id).value = data[id];
                    }
                });
                CFG_CHECKBOX_IDS.forEach(id => {
                    if (data[id] !== undefined && document.getElementById(id)) {
                        document.getElementById(id).checked = !!data[id];
                    }
                });
                alert('設定を適用しました！');
            } catch (e) {
                alert('設定の読み込みに失敗しました。正しいJSON形式か確認してください。');
            }
        };

        window.createRoom = async function(maxPlayers) {
            const config = {
                initHandCount: parseInt(document.getElementById('cfg-init-hand-count').value) || 5,
                initMaxNum: parseInt(document.getElementById('cfg-init-max-num').value) || 10,
                drawCount: parseInt(document.getElementById('cfg-draw-count').value) || 2,
                drawMaxNum: parseInt(document.getElementById('cfg-draw-max-num').value) || 20,
                handLimitNum: parseInt(document.getElementById('cfg-hand-limit-num').value) || 150,
                winScore: parseInt(document.getElementById('cfg-win-score').value) || 100,
                maxTurns: parseInt(document.getElementById('cfg-max-turns').value) || 10,
                totalTimeStock: parseInt(document.getElementById('cfg-total-time-stock').value) || 5,
                turnLimitTime: parseInt(document.getElementById('cfg-turn-limit-time').value) || 30,
                resourceInitial: parseFloat(document.getElementById('cfg-resource-initial').value),
                resourceMin: parseFloat(document.getElementById('cfg-resource-min').value) || 0,
                resourceLogBase: parseFloat(document.getElementById('cfg-resource-log-base').value) || 2,
                enablePreview: document.getElementById('cfg-enable-preview') ? document.getElementById('cfg-enable-preview').checked : true,
            };
            let p1Hand = [], p2Hand = [];
            for(let i = 0; i < config.initHandCount; i++) {
                p1Hand.push(Math.floor(Math.random() * config.initMaxNum) + 1);
                p2Hand.push(Math.floor(Math.random() * config.initMaxNum) + 1);
            }
            myPlayerId = 'P1';
            const initialData = {
                status: 'playing', maxPlayers: maxPlayers, turnCount: 1, absoluteTurnIdx: 0,
                turnOrder: ['P1', 'P2'], currentTurnIdx: 0, remainingTime: config.turnLimitTime, timerMode: "stock",
                log: "部屋作成完了。ゲームスタート！\n", config: config, isAIGame: true,
                players: {
                    P1: { name: "プレイヤー 1", score: 0, hand: p1Hand, timeStock: config.totalTimeStock * 60, resource: config.resourceInitial },
                    P2: { name: "CPU AI 🤖", score: 0, hand: p2Hand, timeStock: config.totalTimeStock * 60, resource: config.resourceInitial }
                }
            };
            try {
                await set(roomRef, initialData);
                window.location.hash = roomId;
                document.getElementById('invite-url').innerText = window.location.href;
            } catch (err) { alert("部屋作成失敗: " + err.message); }
        };

        window.createOnlineRoom = async function() {
            const config = {
                initHandCount: parseInt(document.getElementById('cfg-init-hand-count').value) || 5,
                initMaxNum: parseInt(document.getElementById('cfg-init-max-num').value) || 10,
                drawCount: parseInt(document.getElementById('cfg-draw-count').value) || 2,
                drawMaxNum: parseInt(document.getElementById('cfg-draw-max-num').value) || 20,
                handLimitNum: parseInt(document.getElementById('cfg-hand-limit-num').value) || 150,
                winScore: parseInt(document.getElementById('cfg-win-score').value) || 100,
                maxTurns: parseInt(document.getElementById('cfg-max-turns').value) || 10,
                totalTimeStock: parseInt(document.getElementById('cfg-total-time-stock').value) || 5,
                turnLimitTime: parseInt(document.getElementById('cfg-turn-limit-time').value) || 30,
                resourceInitial: parseFloat(document.getElementById('cfg-resource-initial').value),
                resourceMin: parseFloat(document.getElementById('cfg-resource-min').value) || 0,
                resourceLogBase: parseFloat(document.getElementById('cfg-resource-log-base').value) || 2,
                enablePreview: document.getElementById('cfg-enable-preview') ? document.getElementById('cfg-enable-preview').checked : true,
            };
            const initialData = {
                status: 'waiting', maxPlayers: 2, turnCount: 1, absoluteTurnIdx: 0,
                turnOrder: [], currentTurnIdx: 0, remainingTime: config.turnLimitTime, timerMode: "stock",
                log: "オンライン対戦部屋を作成しました。友達を招待してください。\n", config: config, isAIGame: false,
                players: {}
            };
            try {
                await set(roomRef, initialData);
                window.location.hash = roomId;
                document.getElementById('invite-url').innerText = window.location.href;
                window.joinRoom();
            } catch (err) { alert("部屋作成失敗: " + err.message); }
        };

        window.joinRoom = function() {
            runTransaction(roomRef, (currentData) => {
                if (!currentData || currentData.status !== 'waiting') return currentData;
                if(!currentData.players) currentData.players = {};
                if(!currentData.turnOrder) currentData.turnOrder = [];
                
                const currentCount = Object.keys(currentData.players).length;
                if (currentCount >= currentData.maxPlayers) return currentData;
                
                const newId = "P" + (currentCount + 1); myPlayerId = newId;
                const rule = currentData.config;
                let randomHand = [];
                for(let i = 0; i < rule.initHandCount; i++) randomHand.push(Math.floor(Math.random() * rule.initMaxNum) + 1);
                
                currentData.players[newId] = { name: `プレイヤー ${currentCount + 1}`, score: 0, hand: randomHand, timeStock: (rule.totalTimeStock || 5) * 60, resource: isNaN(rule.resourceInitial) ? undefined : rule.resourceInitial };
                currentData.turnOrder.push(newId);
                
                if (Object.keys(currentData.players).length == currentData.maxPlayers) currentData.status = 'playing';
                return currentData;
            });
        };

        function triggerStartTurnDraw() {
            runTransaction(roomRef, (currentData) => {
                if (!currentData) return currentData;
                const activePlayerId = currentData.turnOrder[currentData.currentTurnIdx];
                if (activePlayerId !== myPlayerId) return currentData; 
                let hand = targetHandArray(currentData.players[myPlayerId].hand);
                for(let i = 0; i < currentData.config.drawCount; i++) hand.push(Math.floor(Math.random() * currentData.config.drawMaxNum) + 1);
                currentData.players[myPlayerId].hand = hand;
                return currentData;
            });
        }

        function updateDOM() {
            if (!gameState || !gameState.status) return;
            const board = document.getElementById('pvp-board'); if(!board) return; board.innerHTML = '';
            const activePlayerId = gameState.turnOrder ? gameState.turnOrder[gameState.currentTurnIdx] : null;
            const isMyTurn = (activePlayerId === myPlayerId && gameState.status === 'playing');
            
            const activePlayer = gameState.players && gameState.players[activePlayerId];
            const stockSec = activePlayer ? (activePlayer.timeStock || 0) : 0;
            const stockStr = `${Math.floor(stockSec / 60)}:${String(stockSec % 60).padStart(2, '0')}`;
            document.getElementById('timer-player-name').innerText = activePlayer ? `${activePlayer.name} のターン` : '⏳ タイマー';
            document.getElementById('timer-stock-val').innerText = stockStr;
            const timerBox = document.getElementById('timer-box');
            const byoyomiLabel = document.getElementById('timer-byoyomi-label');
            if (gameState.timerMode === "byoyomi") {
                byoyomiLabel.style.display = 'block';
                timerBox.innerText = gameState.remainingTime;
                timerBox.style.color = gameState.remainingTime <= 10 ? '#ef4444' : '#f59e0b';
            } else {
                byoyomiLabel.style.display = 'none';
                timerBox.innerText = stockStr;
                timerBox.style.color = stockSec < 60 ? '#ef4444' : '#1e293b';
            }

            const previewEnabled = !gameState.config || gameState.config.enablePreview !== false;
            const toggleRow = document.querySelector('.analysis-toggle');
            if (toggleRow) toggleRow.style.display = previewEnabled ? 'flex' : 'none';
            if (!previewEnabled) { analysisMode = false; previewPicks = []; }

            if(gameState.turnOrder && gameState.players) {
                gameState.turnOrder.forEach(pid => {
                    const p = gameState.players[pid]; if(!p) return;
                    const div = document.createElement('div');
                    div.className = "player-status" + (pid === activePlayerId && gameState.status === 'playing' ? ' active-turn' : '') + (pid === myPlayerId ? ' my-status' : '');
                    const resInitial = gameState.config?.resourceInitial;
                    const resHtml = (p.resource !== undefined && !isNaN(resInitial))
                        ? `<div style="font-size:11px;color:#7c3aed;margin:2px 0;">🔋 リソース: ${(p.resource||0).toFixed(2)} / ${resInitial}</div>`
                        : '';
                    const isOpponent = pid !== myPlayerId;
                    const miniCardsHtml = targetHandArray(p.hand).map((n, idx) => {
                        const picked = isOpponent && previewPicks.some(pk => pk.pid === pid && pk.idx === idx);
                        const clickAttr = (analysisMode && isOpponent) ? ` onclick="togglePreviewPick('${pid}', ${idx})" style="cursor:pointer;"` : '';
                        return `<div class="mini-card${picked ? ' selected' : ''}"${clickAttr}>${n}${analysisMode ? `<div class="factor-label">${primeFactorStr(n)}</div>` : ''}</div>`;
                    }).join('');
                    div.innerHTML = `<div class="player-header"><div>👤 ${p.name}</div><div class="score-display">${p.score} pt</div></div>${resHtml}<div class="mini-card-container">${miniCardsHtml}</div>`;
                    board.appendChild(div);
                });
            }
            updatePreviewAnalysisPanel();

            const resultBanner = document.getElementById('game-result-banner');
            if (gameState.status === 'finished') {
                if (resultBanner) resultBanner.style.display = 'block';
                const resultText = document.getElementById('game-result-text');
                if (resultText && gameState.players) {
                    const ranked = Object.values(gameState.players).slice().sort((a,b) => (b.score||0) - (a.score||0));
                    const top = ranked[0];
                    const myScore = gameState.players[myPlayerId] ? gameState.players[myPlayerId].score : null;
                    const iWon = top && gameState.players[myPlayerId] === top;
                    resultText.innerText = top
                        ? `🏆 ${top.name} の勝利！（${top.score}pt）` + (myScore !== null ? `　あなた: ${myScore}pt ${iWon ? '🎉' : ''}` : '')
                        : '対戦終了';
                }
            } else if (resultBanner) {
                resultBanner.style.display = 'none';
            }

            document.querySelectorAll('.actions-grid button').forEach(btn => { btn.disabled = !isMyTurn; });
            const myHandArr = gameState.players && gameState.players[myPlayerId] ? targetHandArray(gameState.players[myPlayerId].hand) : [];
            const handArea = document.getElementById('hand-area');
            if(handArea) {
                handArea.innerHTML = '';
                myHandArr.forEach((num, index) => {
                    const div = document.createElement('div');
                    div.className = 'card' + (selectedIndices.includes(index) ? ' selected' : '');
                    div.innerHTML = String(num) + (analysisMode ? `<div class="factor-label">${primeFactorStr(num)}</div>` : '');
                    div.onclick = () => {
                        if (!isMyTurn) return;
                        selectedIndices = selectedIndices.includes(index) ? selectedIndices.filter(i => i !== index) : [...selectedIndices, index];
                        updateDOM();
                    };
                    handArea.appendChild(div);
                });
            }
            updateAnalysisPanel(myHandArr);
            const logArea = document.getElementById('log-area'); if(logArea) { logArea.innerText = gameState.log || ""; logArea.scrollTop = logArea.scrollHeight; }
        }

        let analysisMode = false;
        window.toggleAnalysisMode = function() {
            analysisMode = document.getElementById('analysis-toggle-cb').checked;
            if (!analysisMode) previewPicks = [];
            updateDOM();
        };

        window.togglePreviewPick = function(pid, idx) {
            const existingIdx = previewPicks.findIndex(pk => pk.pid === pid && pk.idx === idx);
            if (existingIdx !== -1) {
                previewPicks.splice(existingIdx, 1);
            } else {
                if (previewPicks.length >= 2) previewPicks.shift();
                previewPicks.push({ pid, idx });
            }
            updateDOM();
        };

        function primeFactorStr(n) {
            if (n <= 1) return String(n);
            let x = n; const parts = [];
            for (let p = 2; p * p <= x; p++) {
                let c = 0;
                while (x % p === 0) { x /= p; c++; }
                if (c > 0) parts.push(c > 1 ? `${p}<sup>${c}</sup>` : `${p}`);
            }
            if (x > 1) parts.push(String(x));
            return parts.length ? parts.join('×') : String(n);
        }

        function gcdNum(a, b) { while (b) { [a, b] = [b, a % b]; } return a; }
        function digitSumNum(n) { return String(n).split('').reduce((s, d) => s + Number(d), 0); }

        function updateAnalysisPanel(myHandArr) {
            const panel = document.getElementById('analysis-panel');
            if (!panel) return;
            if (!analysisMode || selectedIndices.length === 0) { panel.style.display = 'none'; return; }
            const lim = gameState.config ? gameState.config.handLimitNum : Infinity;
            const rows = [];
            if (selectedIndices.length === 1) {
                const a = myHandArr[selectedIndices[0]];
                const ds = digitSumNum(a);
                rows.push(`<div class="row">選択中: <b>${a}</b> = ${primeFactorStr(a)}</div>`);
                if (ds === 0) {
                    rows.push(`<div class="row invalid">🔢 桁和で分裂: 桁の和が0のため不可</div>`);
                } else {
                    const q = Math.floor(a / ds), r = a % ds;
                    const noop = q === a;
                    rows.push(`<div class="row${noop ? ' invalid' : ''}">🔢 桁和で分裂 (桁和${ds}): 商${q}${primeFactorLabel(q)} ＋ 余${r}${r ? primeFactorLabel(r) : ''}${noop ? '（変化なし・不可）' : ''}</div>`);
                }
            } else if (selectedIndices.length === 2) {
                const a = myHandArr[selectedIndices[0]], b = myHandArr[selectedIndices[1]];
                rows.push(`<div class="row">選択中: <b>${a}</b> = ${primeFactorStr(a)}　/　<b>${b}</b> = ${primeFactorStr(b)}</div>`);
                const sum = a + b;
                rows.push(`<div class="row${sum > lim ? ' invalid' : ''}">➕ 足し算: ${a}+${b} = ${sum}${primeFactorLabel(sum)}${sum > lim ? '（上限超え・不可）' : ''}</div>`);
                const sub1 = a - b, sub2 = b - a;
                const subVal = sub1 > 0 ? sub1 : sub2;
                rows.push(`<div class="row${subVal <= 0 ? ' invalid' : ''}">➖ 引き算: |${a}-${b}| = ${subVal}${subVal > 0 ? primeFactorLabel(subVal) : ''}${subVal <= 0 ? '（0以下・不可）' : ''}</div>`);
                if (b !== 0) {
                    const dp = Math.floor(a / b) * (a % b);
                    rows.push(`<div class="row${!(dp > 0 && dp <= lim) ? ' invalid' : ''}">🧩 商×余: (${a}÷${b}の商×余) = ${dp}${dp > 0 ? primeFactorLabel(dp) : ''}${!(dp > 0 && dp <= lim) ? '（不可）' : ''}</div>`);
                }
                const g = gcdNum(a, b);
                const gm = a * g;
                rows.push(`<div class="row${!(g > 1 && gm <= lim) ? ' invalid' : ''}">🔮 最大公約数を掛ける: GCD(${a},${b})=${g} → ${a}×${g} = ${gm}${(g > 1) ? primeFactorLabel(gm) : ''}${!(g > 1 && gm <= lim) ? '（不可）' : ''}</div>`);
            } else {
                rows.push(`<div class="row">3枚以上選択中（演算は1〜2枚で実行されます）</div>`);
            }
            panel.innerHTML = rows.join('');
            panel.style.display = 'block';
        }

        function primeFactorLabel(n) { return ` = ${primeFactorStr(n)}`; }

        function updatePreviewAnalysisPanel() {
            const panel = document.getElementById('preview-analysis-panel');
            if (!panel) return;
            if (!analysisMode || previewPicks.length === 0 || !gameState.players) { panel.style.display = 'none'; return; }
            const nums = previewPicks.map(pk => {
                const p = gameState.players[pk.pid];
                const hand = targetHandArray(p ? p.hand : []);
                return { name: p ? p.name : pk.pid, n: hand[pk.idx] };
            }).filter(x => x.n !== undefined);
            if (nums.length === 0) { panel.style.display = 'none'; return; }

            const rows = [`<div class="row" style="font-weight:bold;">👀 相手カードの演算プレビュー</div>`];
            nums.forEach(x => rows.push(`<div class="row">${x.name}: <b>${x.n}</b> = ${primeFactorStr(x.n)}</div>`));

            if (nums.length === 1) {
                const a = nums[0].n;
                const ds = digitSumNum(a);
                if (ds > 0) {
                    const q = Math.floor(a / ds), r = a % ds;
                    rows.push(`<div class="row">🔢 桁和で分裂 (桁和${ds}): 商${q}${primeFactorLabel(q)} ＋ 余${r}${r ? primeFactorLabel(r) : ''}</div>`);
                }
            } else if (nums.length === 2) {
                const a = nums[0].n, b = nums[1].n;
                const sum = a + b;
                rows.push(`<div class="row">➕ 足し算: ${a}+${b} = ${sum}${primeFactorLabel(sum)}</div>`);
                const sub1 = a - b, sub2 = b - a;
                const subVal = sub1 > 0 ? sub1 : sub2;
                rows.push(`<div class="row">➖ 引き算: |${a}-${b}| = ${subVal}${subVal > 0 ? primeFactorLabel(subVal) : ''}</div>`);
                if (b !== 0) {
                    const dp = Math.floor(a / b) * (a % b);
                    rows.push(`<div class="row">🧩 商×余: (${a}÷${b}の商×余) = ${dp}${dp ? primeFactorLabel(dp) : ''}</div>`);
                }
                const g = gcdNum(a, b);
                const gm = a * g;
                rows.push(`<div class="row">🔮 最大公約数を掛ける: GCD(${a},${b})=${g} → ${a}×${g} = ${gm}${g > 1 ? primeFactorLabel(gm) : ''}</div>`);
            }
            panel.innerHTML = rows.join('');
            panel.style.display = 'block';
        }

        // リソースチェック＆更新: 操作可能なら true を返しリソースを更新、不可なら false
        function checkAndApplyResource(currentData, pid, handBefore, handAfter) {
            const cfg = currentData.config;
            if (isNaN(cfg.resourceInitial) || cfg.resourceInitial === undefined) return true;
            const sumBefore = handBefore.reduce((s,n)=>s+n, 0);
            const sumAfter  = handAfter.reduce((s,n)=>s+n, 0);
            const rm = cfg.resourceMin ?? 0;
            const effectiveBefore = Math.max(sumBefore, rm);
            const diff = sumAfter - effectiveBefore;
            if (diff === 0) return true;
            const base = Math.max(isNaN(cfg.resourceLogBase) ? 2 : cfg.resourceLogBase, 1.001);
            const sign = diff > 0 ? 1 : -1;
            const delta = sign * Math.log(Math.abs(diff) + 1) / Math.log(base);
            const resource = currentData.players[pid].resource ?? cfg.resourceInitial;
            if (resource + delta < 0) return false;
            currentData.players[pid].resource = resource + delta;
            return true;
        }

        function resourceLabel(currentData, pid) {
            const cfg = currentData.config;
            if (isNaN(cfg.resourceInitial) || cfg.resourceInitial === undefined) return '';
            return ` 🔋${(currentData.players[pid].resource ?? 0).toFixed(2)}`;
        }

        window.executeAttack = function() {
            if (selectedIndices.length !== 1) return alert('カードを1枚選んでください');
            runTransaction(roomRef, (currentData) => {
                let myHand = targetHandArray(currentData.players[myPlayerId].hand);
                const handBefore = [...myHand];
                let attackNum = myHand[selectedIndices[0]]; if(attackNum===1) return currentData;
                const newHand = myHand.filter((_,i) => i !== selectedIndices[0]);
                if (!checkAndApplyResource(currentData, myPlayerId, handBefore, newHand)) {
                    currentData.log = (currentData.log||'') + `⚠️ ${currentData.players[myPlayerId].name}: リソース不足で攻撃できません\n`;
                    return currentData;
                }
                let gained = 0;
                Object.keys(currentData.players).forEach(pid => {
                    if (pid === myPlayerId) return;
                    let th = targetHandArray(currentData.players[pid].hand);
                    currentData.players[pid].hand = th.filter(n => { if(n%attackNum===0){ gained+=n; return false;} return true; });
                });
                currentData.players[myPlayerId].hand = newHand;
                currentData.players[myPlayerId].score += gained;
                currentData.log = (currentData.log||'') + `⚔️ ${currentData.players[myPlayerId].name} が [${attackNum}] で攻撃！ ${gained}点獲得${resourceLabel(currentData, myPlayerId)}\n`;
                if(currentData.players[myPlayerId].score >= currentData.config.winScore) currentData.status = 'finished';
                return currentData;
            }).then(() => { selectedIndices = []; updateDOM(); });
        };

        window.endTurn = function() {
            runTransaction(roomRef, (currentData) => { advanceTurn(currentData); return currentData; }).then(() => { selectedIndices = []; updateDOM(); });
        };

        function advanceTurn(currentData) {
            currentData.currentTurnIdx = (currentData.currentTurnIdx + 1) % currentData.turnOrder.length;
            currentData.absoluteTurnIdx++;
            if (currentData.currentTurnIdx === 0) {
                currentData.turnCount++;
                if (currentData.turnCount > currentData.config.maxTurns) currentData.status = 'finished';
            }
        }
        function targetHandArray(h) { return h ? (Array.isArray(h) ? h : Object.values(h)) : []; }

        function checkNumberLimit(val) {
            const limit = gameState?.config?.handLimitNum || 150;
            if (val > limit) { alert(`計算結果が上限値 [${limit}] を超えるため変換できません`); return false; }
            return true;
        }

        function executeOp2(formula, label, checkPositive = false) {
            if(selectedIndices.length !== 2) return alert('2枚選んでください');
            const myHand = gameState.players && gameState.players[myPlayerId] ? targetHandArray(gameState.players[myPlayerId].hand) : [];
            const n1 = myHand[selectedIndices[0]], n2 = myHand[selectedIndices[1]];
            if(n1 === undefined || n2 === undefined) return;
            const res = formula(n1, n2);
            if(res === null) return;
            if(checkPositive && res <= 0) return alert('0以下になる引き算はできません');
            if(!checkNumberLimit(res)) return;
            runTransaction(roomRef, (currentData) => {
                let h = targetHandArray(currentData.players[myPlayerId].hand);
                const handBefore = [...h];
                const newH = [...h.filter((_,i) => i!==selectedIndices[0] && i!==selectedIndices[1]), res];
                if (!checkAndApplyResource(currentData, myPlayerId, handBefore, newH)) {
                    currentData.log = (currentData.log||'') + `⚠️ ${currentData.players[myPlayerId].name}: リソース不足で${label}できません\n`;
                    return currentData;
                }
                currentData.players[myPlayerId].hand = newH;
                currentData.log = (currentData.log||'') + `🔮 ${currentData.players[myPlayerId].name}: ${n1} と ${n2} → [${res}] (${label})${resourceLabel(currentData, myPlayerId)}\n`;
                return currentData;
            }).then(() => { selectedIndices = []; updateDOM(); });
        }

        window.opAdd = function() { executeOp2((a,b) => a+b, '足し算'); };
        window.opSub = function() { executeOp2((a,b) => a-b, '引き算', true); };

        window.opDivProduct = function() {
            executeOp2((a, b) => {
                if(b === 0) { alert('0で割ることはできません'); return null; }
                return Math.floor(a/b) * (a%b);
            }, '商×余');
        };

        window.opDigitSumDiv = function() {
            if(selectedIndices.length !== 1) return alert('1枚選んでください');
            const myHand = gameState.players && gameState.players[myPlayerId] ? targetHandArray(gameState.players[myPlayerId].hand) : [];
            const num = myHand[selectedIndices[0]];
            if(num === undefined) return;
            const digitSum = String(num).split('').reduce((s,d) => s+parseInt(d), 0);
            if(digitSum === 0) return alert('桁の和が0のため変換できません');
            const q = Math.floor(num / digitSum), r = num % digitSum;
            if(!checkNumberLimit(q)) return;
            runTransaction(roomRef, (currentData) => {
                let h = targetHandArray(currentData.players[myPlayerId].hand);
                const handBefore = [...h];
                const newH = [...h];
                newH.splice(selectedIndices[0], 1);
                newH.push(q);
                if(r > 0) newH.push(r);
                if (!checkAndApplyResource(currentData, myPlayerId, handBefore, newH)) {
                    currentData.log = (currentData.log||'') + `⚠️ ${currentData.players[myPlayerId].name}: リソース不足で桁和分裂できません\n`;
                    return currentData;
                }
                currentData.players[myPlayerId].hand = newH;
                currentData.log = (currentData.log||'') + `🔢 ${currentData.players[myPlayerId].name}: [${num}] → [${q}]${r>0?` と [${r}]`:''}  (桁和分裂)${resourceLabel(currentData, myPlayerId)}\n`;
                return currentData;
            }).then(() => { selectedIndices = []; updateDOM(); });
        };

        window.opGcdMul = function() {
            if(selectedIndices.length !== 2) return alert('2枚選んでください');
            const myHand = gameState.players && gameState.players[myPlayerId] ? targetHandArray(gameState.players[myPlayerId].hand) : [];
            const X = myHand[selectedIndices[0]], Y = myHand[selectedIndices[1]];
            if(X === undefined || Y === undefined) return;
            let a = X, b = Y;
            while(b) { let t = b; b = a%b; a = t; }
            const gcd = a;
            if(gcd === 1) return alert('最大公約数が1のため操作できません');
            const res = X * gcd;
            if(!checkNumberLimit(res)) return;
            runTransaction(roomRef, (currentData) => {
                let h = targetHandArray(currentData.players[myPlayerId].hand);
                const handBefore = [...h];
                const newH = [...h];
                const i1 = newH.indexOf(X); if(i1!==-1) newH.splice(i1,1);
                const i2 = newH.indexOf(Y); if(i2!==-1) newH.splice(i2,1);
                newH.push(res);
                if (!checkAndApplyResource(currentData, myPlayerId, handBefore, newH)) {
                    currentData.log = (currentData.log||'') + `⚠️ ${currentData.players[myPlayerId].name}: リソース不足でGCD掛け算できません\n`;
                    return currentData;
                }
                currentData.players[myPlayerId].hand = newH;
                currentData.log = (currentData.log||'') + `🔮 ${currentData.players[myPlayerId].name}: [${X}]×[${Y}]のGCD(${gcd})→ [${res}] (GCD掛け算)${resourceLabel(currentData, myPlayerId)}\n`;
                return currentData;
            }).then(() => { selectedIndices = []; updateDOM(); });
        };

        window.resetRoom = function() { set(roomRef, null); location.reload(); };

        window.rematch = function() {
            runTransaction(roomRef, (currentData) => {
                if (!currentData || currentData.status !== 'finished') return currentData;
                const cfg = currentData.config;
                const turnOrder = currentData.turnOrder || Object.keys(currentData.players);
                turnOrder.forEach(pid => {
                    const p = currentData.players[pid];
                    if (!p) return;
                    const hand = [];
                    for (let i = 0; i < cfg.initHandCount; i++) hand.push(Math.floor(Math.random() * cfg.initMaxNum) + 1);
                    p.hand = hand;
                    p.score = 0;
                    p.timeStock = cfg.totalTimeStock * 60;
                    p.resource = cfg.resourceInitial;
                });
                currentData.status = 'playing';
                currentData.turnCount = 1;
                currentData.absoluteTurnIdx = 0;
                currentData.currentTurnIdx = 0;
                currentData.remainingTime = cfg.turnLimitTime;
                currentData.timerMode = 'stock';
                currentData.log = '🔄 次の対戦を開始！\n';
                return currentData;
            }).then(() => { selectedIndices = []; updateDOM(); });
        };
    </script>
</head>
<body>
<div class="game-container">
    <h1>数理変換タクティクス 🔥最強AI育成版🔥</h1>
    
    <div class="debug-panel">
        <span id="debug-badge" class="status-badge status-loading">接続確認中...</span>
        <div id="debug-detail">Firebase通信テスト中。</div>
    </div>

    <div class="ai-train-panel">
        <b style="color:#d97706;">🏋️‍♂️ 最強AI 逆輸入システム</b>
        <p style="margin: 4px 0;">Colab(H5形式経由)で育てた脳みそをURLから綺麗に読み込みます。</p>
        <button id="btn-load-brain" style="background:#f59e0b; color:white; padding:6px 12px; font-weight:bold; border-radius:6px; border:none; cursor:pointer; width: 100%;">📥 Colabから脳��そロード</button>
    </div>
    
    <div id="room-setup" class="setup-panel">
        <div class="setting-group">
            <div class="setting-item"><label>初期手札枚数</label><input type="number" id="cfg-init-hand-count" value="5"></div>
            <div class="setting-item"><label>初期手札最大値</label><input type="number" id="cfg-init-max-num" value="10"></div>
            <div class="setting-item"><label>毎ターンドロー枚数</label><input type="number" id="cfg-draw-count" value="2"></div>
            <div class="setting-item"><label>ドロー最大値</label><input type="number" id="cfg-draw-max-num" value="20"></div>
            <div class="setting-item"><label>手札数値上限値</label><input type="number" id="cfg-hand-limit-num" value="150"></div>
            <div class="setting-item"><label>目標勝利ポイント</label><input type="number" id="cfg-win-score" value="100"></div>
            <div class="setting-item"><label>最大ターン数</label><input type="number" id="cfg-max-turns" value="10"></div>
            <div class="setting-item" style="background:#f5f3ff; border-radius:4px; padding:4px;">
                <label style="color:#7c3aed; font-weight:bold;">🔋 初期リソース値</label>
                <input type="number" id="cfg-resource-initial" value="10" step="0.5" min="0">
            </div>
            <div class="setting-item" style="background:#f5f3ff; border-radius:4px; padding:4px;">
                <label style="color:#7c3aed; font-weight:bold;">🔻 リソース最低値（差分基準）</label>
                <input type="number" id="cfg-resource-min" value="0" step="0.5" min="0">
            </div>
            <div class="setting-item" style="background:#f5f3ff; border-radius:4px; padding:4px;">
                <label style="color:#7c3aed; font-weight:bold;">📊 リソース対数の底 a</label>
                <input type="number" id="cfg-resource-log-base" value="2" step="0.1" min="1.1">
            </div>
            <div class="setting-item" style="background:#eff6ff; border-radius:4px; padding:4px;">
                <label style="color:#1d4ed8; font-weight:bold;">⏳ 持ち時間（分）</label>
                <input type="number" id="cfg-total-time-stock" value="5" min="1" max="60">
            </div>
            <div class="setting-item" style="background:#fff1f2; border-radius:4px; padding:4px;">
                <label style="color:#b91c1c; font-weight:bold;">🔔 秒読み（秒）</label>
                <input type="number" id="cfg-turn-limit-time" value="30" min="5" max="300">
            </div>
            <div class="setting-item" style="background:#f5f3ff; border-radius:4px; padding:4px;">
                <label style="color:#7c3aed; font-weight:bold;">🔬 素因数分解・演算プレビュー機能</label>
                <input type="checkbox" id="cfg-enable-preview" checked style="width:auto;">
            </div>
        </div>
        <div style="margin-top:10px; padding:8px; background:#f0fdf4; border-radius:8px;">
            <div style="display:flex; gap:8px; margin-bottom:6px;">
                <button onclick="copySettings()" style="background:#059669; color:white; padding:6px 12px; border-radius:6px; border:none; cursor:pointer;">📋 設定をコピー</button>
                <button onclick="applySettings()" style="background:#0891b2; color:white; padding:6px 12px; border-radius:6px; border:none; cursor:pointer;">📥 設定を適用</button>
            </div>
            <textarea id="cfg-clipboard-area" placeholder="ここに設定JSONを貼り付けて「設定を適用」を押してください" style="width:100%; height:50px; font-size:0.8rem; font-family:monospace; box-sizing:border-box;"></textarea>
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:8px;">
            <button style="background:#2563eb; color:white; padding:10px 18px; border-radius:8px; font-size:1rem;" onclick="createRoom(2)">🤖 AI対戦を開始</button>
            <button style="background:#16a34a; color:white; padding:10px 18px; border-radius:8px; font-size:1rem;" onclick="createOnlineRoom()">🌐 オンライン対戦部屋を作成</button>
        </div>
    </div>

    <div id="waiting-screen" class="waiting-screen" style="display:none;">
        <h3>👥 参加待機中...</h3>
        <p>現在: <span id="current-count">0</span> / <span id="target-count">0</span> 人</p>
        <div class="url-box"><span id="invite-url"></span></div>
        <button id="btn-auto-join" style="background:#10b981; width:100%;" onclick="joinRoom()">この部屋に参戦する</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div id="rules-summary-box" class="rules-summary">ルール適用中</div>
        <div id="game-result-banner" style="display:none; text-align:center; background:#fef3c7; border:2px solid #f59e0b; border-radius:8px; padding:14px; margin-bottom:12px;">
            <div id="game-result-text" style="font-size:1.1rem; font-weight:bold; margin-bottom:8px;"></div>
            <button onclick="rematch()" style="background:#f59e0b; color:white; padding:10px 18px; border-radius:8px; font-size:1rem; border:none; cursor:pointer;">🔄 次の対戦をする</button>
        </div>
        <div class="timer-panel">
            <div id="timer-player-name" class="timer-title">⏳ タイマー</div>
            <div class="timer-stock-row">⏱ 持ち時間: <span id="timer-stock-val">--</span></div>
            <div id="timer-byoyomi-label" class="timer-byoyomi-label">🔔 秒 読 み</div>
            <div id="timer-box" class="timer-count">--</div>
        </div>
        <div class="analysis-toggle"><label><input type="checkbox" id="analysis-toggle-cb" onchange="toggleAnalysisMode()"> 🔬 素因数分解・演算プレビュー モード（相手の手札もクリックで選択可）</label></div>
        <div class="section-title">全プレイヤーの状況</div><div class="pvp-board" id="pvp-board"></div>
        <div id="preview-analysis-panel" class="analysis-panel" style="display:none;"></div>
        <div id="turn-info" style="text-align: center; font-weight: bold; margin-bottom: 15px;"></div>
        <div class="section-title">あなたの手札</div><div class="hand-container" id="hand-area"></div>
        <div id="analysis-panel" class="analysis-panel" style="display:none;"></div>
        <div class="section-title">コマンド</div>
        <div class="actions-grid">
            <button class="btn-attack" onclick="executeAttack()">⚔️ 約数強奪攻撃</button>
            <button class="btn-main" onclick="endTurn()">🚪 ターン終了</button>
            <button class="btn-op" onclick="opAdd()">➕ 足し算 (2枚)</button>
            <button class="btn-op" onclick="opSub()">➖ 引き算 (2枚)</button>
            <button class="btn-op" onclick="opDivProduct()">🧩 商×余 (2枚)</button>
            <button class="btn-op" onclick="opDigitSumDiv()">🔢 桁和で分裂 (1枚)</button>
            <button class="btn-op-special" onclick="opGcdMul()">🔮 最大公約数を掛ける (2枚)</button>
        </div>
        <div class="section-title">バトルログ</div><div class="log-container" id="log-area"></div>
        <button onclick="resetRoom()" style="margin-top: 15px; width: 100%; background: #64748b; color: white;">🔄 リセット</button>
    </div>
</div>
</body>
</html>
